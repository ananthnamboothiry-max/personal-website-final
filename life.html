<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life — Ananth Namboothiry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Life page overrides: dark full-viewport canvas ── */
    body { background: #0f0f0f; }

    #life-stage {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      contain: layout style;
    }

    /* hint overlay */
    #life-hint {
      position: absolute;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-family: var(--f-mono);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.22);
      pointer-events: none;
      transition: opacity 1.2s ease;
      white-space: nowrap;
    }
    #life-hint.gone { opacity: 0; }

    /* scatter button */
    #scatter-btn {
      position: fixed;
      bottom: 1.8rem; right: 2rem;
      font-family: var(--f-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.4rem 1rem;
      cursor: none;
      transition: color 0.2s, border-color 0.2s;
      z-index: 500;
    }
    #scatter-btn:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.35);
    }

    /* photo cards */
    .photo-card {
      position: absolute;
      left: 0; top: 0;
      width: 155px;
      background: #fff;
      padding: 0.55rem 0.55rem 2.6rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      will-change: transform;
      user-select: none;
      transition: box-shadow 0.15s;
    }
    .photo-card.grabbed {
      box-shadow: 0 16px 48px rgba(0,0,0,0.8);
    }
    .pc-img {
      width: 100%;
      aspect-ratio: 1;
      background: #e8e8e5;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pc-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .pc-ph {
      font-size: 1.8rem;
      color: #bbb;
      display: none;
      width: 100%; height: 100%;
      align-items: center;
      justify-content: center;
    }
    .pc-cap {
      font-family: var(--f-hand);
      font-size: 0.88rem;
      color: #555;
      text-align: center;
      margin-top: 0.4rem;
      line-height: 1.3;
      position: absolute;
      bottom: 0.4rem;
      left: 0.5rem; right: 0.5rem;
    }

    /* lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      padding: 2rem;
    }
    #lightbox.hidden { display: none; }
    #lb-img {
      max-width: min(90vw, 800px);
      max-height: 80vh;
      object-fit: contain;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
      display: block;
    }
    #lb-cap {
      font-family: var(--f-hand);
      font-size: 1.1rem;
      color: rgba(255,255,255,0.55);
      margin-top: 1rem;
      text-align: center;
    }
    #lb-close {
      position: fixed;
      top: 1.2rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(255,255,255,0.35);
      font-size: 1.2rem;
      cursor: none;
      transition: color 0.15s;
    }
    #lb-close:hover { color: white; }
    #lb-nav {
      position: fixed;
      bottom: 1.5rem;
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
    }

    /* nav: slight transparency over the dark stage */
    nav { background: rgba(15,15,15,0.85); backdrop-filter: blur(8px); }
  </style>
</head>
<body>
  <div id="cursor-dot" style="background:#fff;mix-blend-mode:difference;"></div>

  <nav>
    <a href="index.html" class="nav-name">Ananth Namboothiry</a>
    <ul class="nav-links">
      <li><a href="work.html">work</a></li>
      <li><a href="thoughts.html">thoughts</a></li>
      <li><a href="life.html" class="active">life</a></li>
      <li><a href="poker.html">poker</a></li>
    </ul>
  </nav>

  <!-- Physics stage -->
  <div id="life-stage">
    <div id="life-hint">move your mouse &nbsp;·&nbsp; grab &amp; fling &nbsp;·&nbsp; click to open</div>
  </div>

  <!-- Scatter -->
  <button id="scatter-btn">scatter ↻</button>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <button id="lb-close">✕</button>
    <img id="lb-img" src="" alt="" />
    <p id="lb-cap"></p>
    <p id="lb-nav">ESC or click outside to close</p>
  </div>

  <!-- Konami overlay -->
  <div id="konami-overlay" class="konami-overlay hidden">
    <div class="konami-card">
      <button class="konami-close" id="konami-close">✕</button>
      <p class="konami-intro">nice hand, Ananth</p>
      <div id="konami-hand" class="poker-hand"></div>
      <p class="konami-hint">↑↑↓↓←→←→BA</p>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/life.js"></script>
</body>
</html>
